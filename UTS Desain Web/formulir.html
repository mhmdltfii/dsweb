<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pemesanan - HMB Store</title>
</head>
<body>
<header>
    <h1>HMB Store</h1>
    <nav>
        <a href="beranda.html">Beranda</a> |
        <a href="gallery.html">Gallery</a> |
        <a href="formulir.html">Form</a>
    </nav>
</header>

<main>
    <section>
        <article>
            <h2>Formulir Pemesanan</h2>
            <form action="#" onsubmit="alert('Form berhasil dikirim!')">
                <p>
                    <label>Nama:</label><br>
                    <input type="text" required>
                </p>

                <p>
                    <label>Email:</label><br>
                    <input type="email" required>
                </p>

                <p>
                    <label>Jenis Kelamin:</label><br>
                    <input type="radio" name="jk"> Laki-laki
                    <input type="radio" name="jk"> Perempuan
                </p>

                <p>
                    <label>Pakaian yang ingin dibeli:</label><br>
                    <input type="checkbox" name="pakaian"> Kaos
                    <input type="checkbox" name="pakaian"> Celana
                    <input type="checkbox" name="pakaian"> Hoodie
                    <input type="checkbox" name="pakaian"> Topi
                </p>

                <p>
                    <label>Catatan:</label><br>
                    <textarea></textarea>
                </p>

                <p>
                    <label>Upload File:</label><br>
                    <input type="file">
                </p>

                <button type="submit">Kirim</button>
            </form>
        </article>
    </section>
</main>

<footer>
    <p>&copy; 2026 HMB Store. Hak Cipta Dilindungi Undang-Undang.</p>
</footer>
</body>
</html>
