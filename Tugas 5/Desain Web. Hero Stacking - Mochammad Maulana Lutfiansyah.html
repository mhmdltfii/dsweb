<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Section</title>
    <style>
        body {
            margin: 0;
        }

        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            background-image: url('Pemandangan Alam 1.jpg');
            background-size: cover;
            background-position: center;
        }

        /* Tablet */
        @media (max-width: 992px) {
            .hero {
                background-image: url('Pemandangan Alam 2.avif');
            }
        }

        /* Mobile */
        @media (max-width: 600px) {
            .hero {
                background-image: url('Pemandangan Alam 3.avif');
            }
        }

        .hero-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <section class="hero">
        <article class="hero-text">
            <h1>Selamat Datang</h1>
            <p>Di HMB Art</p>
        </article>
    </section>

</body>
</html>
