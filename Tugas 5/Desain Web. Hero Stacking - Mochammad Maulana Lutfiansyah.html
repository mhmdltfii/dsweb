<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Section</title>
    <style>
        body {
            margin: 0;
        }

        .hero {
            width: 100%;
            height: 100vh;
            background-image: url('Pemandangan\ Alam\ 1.jpg'); /* 1 gambar saja */
            background-size: cover; /* biar penuh & rapi */
            background-position: center;
            position: relative;
        }

        .hero-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="hero-text">
            <h1>Selamat Datang</h1>
            <p>Di Auvara Pictura</p>
        </div>
    </div>

</body>
</html>
