<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atribut srcset dengan Descriptor</title>
</head>
<body>
    <picture>
        <img srcset="/Tugas 5/Pemandangan Alam 1.jpg 320w,
            /Tugas 5/Pemandangan Alam 1.jpg 480w,
            /Tugas 5/Pemandangan Alam 1.jpg 800w"
            sizes="(max-width: 320px) 280px,
            (max-width: 480px) 440px,
            800px"
            src="/Tugas 5/Pemandangan Alam 1.jpg" alt="Gambar responsif">
    </picture>
</body>
</html>
