<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset = "UTF-8">
    <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
    <title>Belajar Membuat Formulir</title>
</head>
<body>
    <h1>Belajar Membuat Formulir</h1>
    <form action="/proses.js" method="POST"></form>
        <label for="nama">Nama Lengkap:</label>
        <input type="text" id="nama" name="nama"></br>
        <label for="telepon">Nomor Telepon:</label>
        <input type="tel" id="telepon" name="telepon" pattern="[0-9]{10}"></br>
        <p>Pilih Bahasa Favorit:</p>
                    <input type="radio">
                    <label for="html">HTML</label></br>
                    <input type="radio">
                    <label for="css">CSS</label></br>
                    <input type="radio">
                    <label for="javascript">JavaScript</label></br>
                    <label for="fname">Nama Depan:</label></br>
                    <input type="text" id="fname" name="fname" placeholder="Tulis nama depan"></br>
                    <button type="submit">Kirim</button></br>
                    <label for="volume">Volume (between 0 and 50):</label></br>
                    <input type="range" id="volume" name="volume" min="0" max="50"></br>
                    <label for="birthday">Tanggal Lahir:</label></br>
                    <input type="date" id="birthday" name="birthday"></br>
    </form>
</body>
</html>
