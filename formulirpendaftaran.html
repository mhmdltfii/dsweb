<!DOCTYPE html>
<html>
<head>
    <title>Form Pendaftaran Siswa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h1>Form Pendaftaran Siswa</h1>

<form>

<fieldset>
    <legend>Data Pribadi</legend>

    <label>Nama Lengkap:</label><br>
    <input type="text" placeholder="Masukkan nama lengkap" size="30"><br><br>

    <label>Email:</label><br>
    <input type="email" placeholder="contoh@email.com" size="30"><br><br>

    <label>Nomor HP:</label><br>
    <input type="tel" placeholder="08xxxxxxxxxx" size="30"><br><br>

    <label>Tanggal Lahir:</label><br>
    <input type="date"><br><br>

    <label>Jenis Kelamin:</label><br>
    <input type="radio" name="jk"> Pria<br>
    <input type="radio" name="jk"> Wanita

</fieldset>

<br>

<fieldset>
    <legend>Data Akademik</legend>

    <label>Program Studi:</label><br>
    <select>
        <option>-- Pilih Jurusan --</option>
        <option>S1 Teknik Informatika</option>
        <option>D3 Manajemen Informatika</option>
        <option>S1 Desain Komunikasi Visual</option>
    </select><br><br>

    <label>Asal Sekolah:</label><br>
    <input type="checkbox"> SMA<br>
    <input type="checkbox"> SMK<br>
    <input type="checkbox"> MA<br><br>

    <label>Upload Foto:</label><br>
    <input type="file"><br><br>

    <label>Catatan Tambahan:</label><br>
    <textarea rows="4" cols="30" placeholder="Tulis catatan tambahan..."></textarea>

</fieldset>

<br>

<input type="submit" value="Daftar Sekarang">
<input type="reset" value="Reset Form">

</form>

</body>
</html>
